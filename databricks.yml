bundle:
  name: enterprise-databricks-lakehouse

variables:
  catalog:
    default: enterprise_lakehouse

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: enterprise_lakehouse_dev

  test:
    mode: development
    variables:
      catalog: enterprise_lakehouse_test

  prod:
    mode: production
    variables:
      catalog: enterprise_lakehouse_prod

resources:
  pipelines:
    orders_dlt_pipeline:
      name: orders-dlt-${bundle.target}

      catalog: ${var.catalog}

      target: bronze
      serverless: true 
      libraries:
        - file:
            path: ./dlt/orders_pipeline.py

      development: true
  jobs:
    retail_lakehouse_pipeline:
      name: retail-lakehouse-pipeline-${bundle.target}
      environments:
        - environment_key: dbt_environment
          spec:
            client: "2"
            dependencies:
              - dbt-databricks

      tasks:
        - task_key: bronze_customers_ingestion
          notebook_task:
            notebook_path: ./notebooks/bronze/bronze_customers_ingestion.py

        - task_key: bronze_orders_ingestion
          notebook_task:
            notebook_path: ./notebooks/bronze/bronze_orders_ingestion.py

        - task_key: silver_customers_transformation
          depends_on:
            - task_key: bronze_customers_ingestion
          notebook_task:
            notebook_path: ./notebooks/silver/silver_customers_transformation.py

        - task_key: silver_orders_transformation
          depends_on:
            - task_key: bronze_orders_ingestion
          notebook_task:
            notebook_path: ./notebooks/silver/silver_orders_transformation.py

        - task_key: silver_orders_incremental_merge
          depends_on:
            - task_key: silver_orders_transformation
          notebook_task:
            notebook_path: ./notebooks/silver/silver_orders_incremental_merge.py

        - task_key: run_dbt_gold
          depends_on:
            - task_key: silver_customers_transformation
            - task_key: silver_orders_incremental_merge
          notebook_task:
            notebook_path: ./notebooks/gold/run_dbt_gold.py          
