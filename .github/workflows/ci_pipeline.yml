name: Enterprise Lakehouse CI Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  validate-project:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requeriments.txt

      - name: Validate Python Files
        run: |
          python -m compileall src/

      - name: Run dbt Models
        run: |
          cd enterprise_lakehouse_dbt
          dbt run --profiles-dir profiles

      - name: Run dbt Tests
        run: |
          cd enterprise_lakehouse_dbt
          dbt test --profiles-dir profiles

      - name: Validate Notebook Structure
        run: |
          find notebooks/ -name "*.py"

      - name: Validate README Exists
        run: |
          test -f README.md

      - name: Validate Architecture Screenshots
        run: |
          test -d docs/architecture/diagrams

      - name: CI Pipeline Completed
        run: |
          echo "Enterprise Lakehouse CI Pipeline completed successfully."